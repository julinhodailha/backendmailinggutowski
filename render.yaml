# render.yaml — Deploy automático no Render
# Suba este arquivo no repositório e conecte no Render Dashboard

services:
  - type: web
    name: gutowski-mailing-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false          # preencher manualmente no Render Dashboard
      - key: JWT_SECRET
        generateValue: true  # Render gera automaticamente
      - key: ALLOWED_ORIGINS
        value: https://mailing.gutowski.com.br
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: admin@amanda
      - key: ADMIN_PASSWORD
        sync: false          # preencher manualmente
